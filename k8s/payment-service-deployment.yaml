apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -w 2 -z kafka-service 9092; do
                echo waiting for kafka;
                sleep 2;
              done
      containers:
        - name: payment-service
          image: payment-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: DOCKER_SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DOCKER_SPRING_MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: USER_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_SERVICE_URL
            - name: DOCKER_EXTERNAL_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DOCKER_EXTERNAL_SERVICE_URL
            - name: DOCKER_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: TOPIC_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: TOPIC_NAME
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            periodSeconds: 10
            failureThreshold: 3