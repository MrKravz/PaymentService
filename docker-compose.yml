version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper-svc
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-svc
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-svc:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-svc:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  bank-mock-service:
    build:
      context: ../BankApiMockService
      dockerfile: Dockerfile
    container_name: bank-mock
    restart: unless-stopped
    ports:
      - "8085:8085"

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    depends_on:
      - mongodb
      - kafka
      - bank-mock-service
    ports:
      - "8084:8084"
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      EXTERNAL_SERVICE_URL: http://bank-mock:8085/transactions
      TOPIC_NAME: ${TOPIC_NAME}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-svc:9092

volumes:
  mongodb_data: